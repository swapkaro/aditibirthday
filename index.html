<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Aditi's TARDIS ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #60a5fa;
    --indigo: #818cf8;
    --purple: #a78bfa;
    --slate: #e2e8f0;
    --muted: rgba(203,213,225,0.75);
    --font: 'Crimson Pro', Georgia, serif;
  }

  html, body {
    min-height: 100dvh;
    background: radial-gradient(ellipse at 20% 20%, #0f0a2e 0%, #050818 40%, #0a0520 70%, #020510 100%);
    color: var(--slate);
    font-family: var(--font);
    overflow-x: hidden;
  }

  /* ── STARS ── */
  #starfield {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* ── PARTICLES ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,197,253,0.8), rgba(192,132,252,0.4));
    animation: rise var(--dur) var(--delay) infinite ease-out;
  }
  @keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    15% { opacity: 0.8; }
    85% { opacity: 0.4; }
    100% { transform: translateY(-110vh); opacity: 0; }
  }

  /* ── SCREENS ── */
  .screen {
    position: relative; z-index: 10;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .screen.active { opacity: 1; pointer-events: all; }
  .screen.hidden { display: none; }

  /* ── LANDING ── */
  #landing h1 {
    font-size: clamp(1.7rem, 6vw, 2.4rem);
    font-weight: 700;
    background: linear-gradient(135deg, #e2e8f0, #93c5fd, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2rem;
    letter-spacing: 0.01em;
  }

  /* ── TARDIS WRAPPER ── */
  #tardis-wrap {
    cursor: pointer;
    width: 160px;
    position: relative;
    animation: float 4s ease-in-out infinite;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #tardis-wrap:active { transform: scale(0.97); }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .ground-glow {
    position: absolute; bottom: -12px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 14px;
    background: radial-gradient(ellipse, rgba(96,165,250,0.5), transparent);
    border-radius: 50%;
    filter: blur(6px);
  }

  /* ── TARDIS SVG ANIMATIONS ── */
  #lamp-glow { animation: lampPulse 1.5s ease-in-out infinite; }
  @keyframes lampPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  .win-glow { animation: winPulse 2s ease-in-out infinite; }
  .win-glow-2 { animation: winPulse 2s 0.5s ease-in-out infinite; }
  @keyframes winPulse { 0%,100%{opacity:0.06} 50%{opacity:0.18} }

  /* Door animation */
  #door-left {
    transform-origin: 33px 50%;
    transform-box: fill-box;
    transition: transform 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  #door-right {
    transform-origin: calc(100% - 0px) 50%;
    transform-box: fill-box;
    transition: transform 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .doors-open #door-left { transform: perspective(300px) rotateY(-65deg); }
  .doors-open #door-right { transform: perspective(300px) rotateY(65deg); }

  #inner-glow { opacity: 0; transition: opacity 0.6s ease 0.4s; }
  #light-beam { opacity: 0; transition: opacity 0.8s ease 0.8s; }
  .doors-open #inner-glow { opacity: 1; }
  .doors-open #light-beam { opacity: 0.5; }

  /* TARDIS glow state */
  #tardis-svg { filter: drop-shadow(0 0 12px #3b82f6); transition: filter 0.4s; }
  .glowing #tardis-svg { filter: drop-shadow(0 0 28px #60a5fa) drop-shadow(0 0 60px #818cf8); }

  /* Invite text */
  .invite-text {
    margin-top: 2rem;
    font-style: italic;
    color: rgba(203,213,225,0.7);
    font-size: 1.05rem;
    line-height: 1.6;
    max-width: 280px;
  }
  .tap-hint {
    display: block;
    margin-top: 1rem;
    font-size: 0.75rem;
    color: rgba(148,163,184,0.45);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* ── INSIDE SCREEN ── */
  #inside {
    justify-content: flex-start;
    padding: 3rem 1rem 3rem;
  }
  .inside-header { margin-bottom: 2rem; }
  .inside-badge {
    display: inline-block;
    padding: 0.35rem 1rem;
    border-radius: 9999px;
    background: rgba(96,165,250,0.08);
    border: 1px solid rgba(96,165,250,0.2);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(147,197,253,0.7);
    margin-bottom: 0.75rem;
  }
  .inside-title {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e2e8f0, #93c5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── CARDS ── */
  .cards-container {
    display: flex; flex-direction: column;
    gap: 1.25rem;
    width: 100%; max-width: 400px;
    margin: 0 auto;
  }
  .memory-card {
    position: relative;
    border-radius: 1.5rem;
    padding: 1.5rem;
    overflow: hidden;
    background: linear-gradient(135deg, rgba(30,27,75,0.95) 0%, rgba(15,23,42,0.98) 100%);
    border: 1px solid rgba(96,165,250,0.25);
    box-shadow: 0 0 20px rgba(96,165,250,0.12), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    text-align: left;
    opacity: 0;
    transform: translateY(32px) scale(0.96);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .memory-card.last-card {
    box-shadow: 0 0 40px rgba(167,139,250,0.3), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    border-color: rgba(167,139,250,0.35);
  }
  .memory-card.visible { opacity: 1; transform: translateY(0) scale(1); }
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(147,197,253,0.04) 50%, transparent 70%);
    pointer-events: none;
  }
  .card-corner {
    position: absolute; top: 0; right: 0;
    width: 6rem; height: 6rem; border-radius: 50%;
    background: radial-gradient(circle, #818cf8, transparent);
    opacity: 0.1;
    transform: translate(30%, -30%);
    pointer-events: none;
  }
  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  .card-content {
    font-size: 0.95rem;
    color: rgba(203,213,225,0.85);
    line-height: 2;
    white-space: pre-line;
    font-style: normal;
  }
  .card-accent {
    margin-top: 1.25rem;
    height: 1px; width: 4rem;
    background: linear-gradient(90deg, rgba(96,165,250,0.6), transparent);
    border-radius: 9999px;
  }

  /* Continue button */
  .continue-btn {
    display: inline-block;
    margin: 2.5rem auto 2rem;
    padding: 1rem 2rem;
    border-radius: 1rem;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #e2e8f0;
    background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(167,139,250,0.2));
    border: 1px solid rgba(147,197,253,0.35);
    box-shadow: 0 0 24px rgba(96,165,250,0.2);
    cursor: pointer;
    transition: box-shadow 0.3s, transform 0.15s;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.3s;
  }
  .continue-btn.visible { opacity: 1; transform: translateY(0); }
  .continue-btn:active { transform: scale(0.96); }

  /* ── FINAL SCREEN ── */
  #final { position: relative; }
  .orb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .orb-inner {
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
    filter: blur(40px);
    animation: orbPulse 4s ease-in-out infinite;
  }
  @keyframes orbPulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.2);opacity:0.8} }

  .final-sparkle { font-size: 2.5rem; margin-bottom: 1.5rem; }
  .final-title {
    font-size: clamp(1.8rem, 6vw, 2.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #f1f5f9, #93c5fd, #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
  }
  .final-text {
    font-size: 1rem;
    color: var(--muted);
    font-style: italic;
    line-height: 2.2;
    max-width: 280px;
    margin: 0 auto 2.5rem;
    white-space: pre-line;
  }
  .exit-btn {
    padding: 1rem 2rem;
    border-radius: 1rem;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #e2e8f0;
    background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(167,139,250,0.2));
    border: 1px solid rgba(167,139,250,0.4);
    box-shadow: 0 0 30px rgba(167,139,250,0.25);
    cursor: pointer;
    transition: box-shadow 0.3s, transform 0.15s;
  }
  .exit-btn:active { transform: scale(0.96); }

  .cake-reveal {
    display: none;
    padding: 1.25rem 2rem;
    border-radius: 1rem;
    background: linear-gradient(135deg, rgba(30,27,75,0.9), rgba(15,23,42,0.95));
    border: 1px solid rgba(96,165,250,0.3);
    box-shadow: 0 0 40px rgba(96,165,250,0.2);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .cake-reveal.show { display: block; }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.8) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .cake-emoji { font-size: 1.8rem; margin-bottom: 0.4rem; }
  .cake-text { font-size: 1rem; font-weight: 600; color: #e2e8f0; }

  /* fade-in animation util */
  .fade-up {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fade-up.in { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- STARFIELD -->
<div id="starfield"></div>
<div id="particles"></div>

<!-- ══ LANDING ══════════════════════════════════════════ -->
<div class="screen active" id="landing">
  <h1 class="fade-up">Happy Birthday Aditi ✨</h1>

  <div id="tardis-wrap" onclick="handleTardisClick()">
    <div class="ground-glow"></div>
    <svg id="tardis-svg" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" style="width:100%">
      <defs>
        <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="lightBeam" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- Inner glow (shown on door open) -->
      <rect id="inner-glow" x="30" y="40" width="140" height="240" fill="url(#innerGlow)"/>

      <!-- Body -->
      <rect x="20" y="30" width="160" height="270" rx="4" fill="#1d4ed8" stroke="#3b82f6" stroke-width="2"/>
      <!-- Roof -->
      <rect x="10" y="20" width="180" height="18" rx="3" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="15" y="14" width="170" height="10" rx="2" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
      <rect x="30" y="6" width="140" height="12" rx="2" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1"/>
      <!-- Lamp -->
      <rect x="88" y="0" width="24" height="10" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <ellipse id="lamp-glow" cx="100" cy="3" rx="10" ry="5" fill="#bfdbfe"/>
      <!-- Sign -->
      <rect x="30" y="38" width="140" height="18" rx="2" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1"/>
      <text x="100" y="51" text-anchor="middle" fill="#bfdbfe" font-size="8" font-family="serif" letter-spacing="2">POLICE BOX</text>
      <!-- Windows -->
      <rect x="32" y="65" width="56" height="44" rx="3" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="112" y="65" width="56" height="44" rx="3" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="60" y1="65" x2="60" y2="109" stroke="#60a5fa" stroke-width="1"/>
      <line x1="32" y1="87" x2="88" y2="87" stroke="#60a5fa" stroke-width="1"/>
      <line x1="140" y1="65" x2="140" y2="109" stroke="#60a5fa" stroke-width="1"/>
      <line x1="112" y1="87" x2="168" y2="87" stroke="#60a5fa" stroke-width="1"/>
      <rect class="win-glow" x="33" y="66" width="54" height="42" rx="2" fill="#bfdbfe"/>
      <rect class="win-glow-2" x="113" y="66" width="54" height="42" rx="2" fill="#bfdbfe"/>
      <!-- Door frame -->
      <rect x="32" y="120" width="136" height="170" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <!-- Left door -->
      <g id="door-left">
        <rect x="33" y="122" width="66" height="166" rx="1" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
        <rect x="38" y="128" width="56" height="70" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <rect x="38" y="208" width="56" height="74" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <circle cx="96" cy="210" r="3" fill="#93c5fd"/>
      </g>
      <!-- Right door -->
      <g id="door-right">
        <rect x="101" y="122" width="66" height="166" rx="1" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
        <rect x="106" y="128" width="56" height="70" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <rect x="106" y="208" width="56" height="74" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <circle cx="104" cy="210" r="3" fill="#93c5fd"/>
      </g>
      <!-- Light beam -->
      <polygon id="light-beam" points="68,122 132,122 160,290 40,290" fill="url(#lightBeam)"/>
    </svg>
  </div>

  <div class="invite-text fade-up">
    "Aditi… come with me in the TARDIS"
    <span class="tap-hint">tap to enter</span>
  </div>
</div>

<!-- ══ INSIDE ══════════════════════════════════════════ -->
<div class="screen hidden" id="inside">
  <div class="inside-header fade-up">
    <div class="inside-badge">inside the tardis</div>
    <div class="inside-title">Memories, floating</div>
  </div>

  <div class="cards-container" id="cards-container"></div>

  <button class="continue-btn" id="continue-btn" onclick="goFinal()">
    Continue the journey →
  </button>
</div>

<!-- ══ FINAL ══════════════════════════════════════════ -->
<div class="screen hidden" id="final">
  <div class="orb"><div class="orb-inner"></div></div>

  <div class="final-sparkle fade-up">✨</div>
  <h2 class="final-title fade-up">You made it ✨</h2>
  <p class="final-text fade-up">not just through the TARDIS

but through all the little things
that make you… you

Happy Birthday Aditi ❤️</p>

  <div id="exit-area">
    <button class="exit-btn fade-up" onclick="showCake()">
      Step out of the TARDIS
    </button>
  </div>

  <div class="cake-reveal" id="cake-reveal">
    <div class="cake-emoji">🎂</div>
    <div class="cake-text">Go find your cake</div>
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────
const sf = document.getElementById('starfield');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${size}px; height:${size}px;
    --dur:${(Math.random()*3+2).toFixed(1)}s;
    --delay:${(Math.random()*4).toFixed(1)}s;
  `;
  sf.appendChild(s);
}

// ── PARTICLES ──────────────────────────────────────────
const pc = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 2;
  p.style.cssText = `
    left:${Math.random()*100}%;
    bottom:0;
    width:${size}px; height:${size}px;
    --dur:${(Math.random()*8+6).toFixed(1)}s;
    --delay:${(Math.random()*6).toFixed(1)}s;
  `;
  pc.appendChild(p);
}

// ── CARDS DATA ─────────────────────────────────────────
const CARDS = [
  {
    title: "The FOMO Queen 👑",
    content: `Tired? Yes.\nStaying in? Never.\n\nOne message\none random plan\none late night drive 🚗\n\nand you're already ready\n\nMissing out?\nNot an option.`
  },
  {
    title: "Thank You, Gary 💕",
    content: `Kushal\nKavya\nUrvi\nAham\nSwapnil\n\nsomehow became\na whole universe\n\nchaos, plans, laughter\nand everything in between\n\nnot just friends\n\nyour people`
  },
  {
    title: "Aditi Logic 🧠",
    content: `High bank balance ✅\nLow credit score ✅\n\nExpensive clothes? obviously\nGadgets? necessary\n\nTry new things\nmeet new people\nhelp everyone\n\nfinancially questionable…\nbut emotionally elite`
  },
  {
    title: "Current Era 📺",
    content: `Selling Sunset energy 💅\nBridgerton drama 🌹\n\nand then…\n\ncringe watching Splitsvilla\nlike it's research\n\nrange = unmatched`
  },
  {
    title: "The Aesthetic Side 🎨",
    content: `good art\nquiet appreciation\nfinding something beautiful\n\nand making it yours\n\nwalls don't stay empty around you`
  },
  {
    title: "A Message from Suzy 🐶",
    content: `I allow this celebration\n\nbut let's be clear\nshe's MY mom\n\nyou're all just guests\n\nSuzy`
  },
  {
    title: "The Truth ❤️",
    content: `You show up\neven when you're tired\n\nYou say yes\nwhen most people wouldn't\n\nYou make plans happen\nand moments matter\n\nand somehow\nyou make everything feel\na little more alive\n\nwe're really lucky\nto have you`,
    last: true
  }
];

// ── BUILD CARDS ────────────────────────────────────────
const container = document.getElementById('cards-container');
CARDS.forEach((card, i) => {
  const el = document.createElement('div');
  el.className = 'memory-card' + (card.last ? ' last-card' : '');
  el.innerHTML = `
    <div class="card-shimmer"></div>
    <div class="card-corner"></div>
    <div class="card-title">${card.title}</div>
    <div class="card-content">${card.content}</div>
    <div class="card-accent"></div>
  `;
  container.appendChild(el);
});

// ── LANDING FADE IN ────────────────────────────────────
setTimeout(() => {
  document.querySelectorAll('#landing .fade-up').forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), i * 300 + 200);
  });
}, 100);

// ── TARDIS CLICK ───────────────────────────────────────
let clicked = false;
function handleTardisClick() {
  if (clicked) return;
  clicked = true;

  const wrap = document.getElementById('tardis-wrap');
  const svg = document.getElementById('tardis-svg');

  // glow
  wrap.classList.add('glowing');

  setTimeout(() => {
    // open doors
    svg.parentElement.classList.add('doors-open');

    setTimeout(() => {
      // transition to inside
      const landing = document.getElementById('landing');
      landing.style.opacity = '0';
      landing.style.transition = 'opacity 0.8s ease';

      setTimeout(() => {
        landing.classList.add('hidden');
        showInside();
      }, 800);
    }, 1600);
  }, 500);
}

// ── SHOW INSIDE ────────────────────────────────────────
function showInside() {
  const inside = document.getElementById('inside');
  inside.classList.remove('hidden');
  requestAnimationFrame(() => {
    inside.classList.add('active');
    // header
    setTimeout(() => {
      inside.querySelector('.fade-up').classList.add('in');
    }, 200);
    // stagger cards
    const cards = document.querySelectorAll('.memory-card');
    cards.forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), 400 + i * 260);
    });
    // continue button
    const btn = document.getElementById('continue-btn');
    setTimeout(() => btn.classList.add('visible'), 400 + cards.length * 260 + 400);
  });
}

// ── GO FINAL ───────────────────────────────────────────
function goFinal() {
  const inside = document.getElementById('inside');
  inside.style.opacity = '0';
  inside.style.transition = 'opacity 0.8s ease';
  setTimeout(() => {
    inside.classList.add('hidden');
    const final = document.getElementById('final');
    final.classList.remove('hidden');
    requestAnimationFrame(() => {
      final.classList.add('active');
      const items = final.querySelectorAll('.fade-up');
      items.forEach((el, i) => {
        setTimeout(() => el.classList.add('in'), 200 + i * 350);
      });
    });
  }, 800);
}

// ── SHOW CAKE ──────────────────────────────────────────
function showCake() {
  document.getElementById('exit-area').style.display = 'none';
  document.getElementById('cake-reveal').classList.add('show');
}
</script>
</body>
