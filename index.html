<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Aditi's TARDIS ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #60a5fa;
  --indigo: #818cf8;
  --purple: #a78bfa;
  --slate: #e2e8f0;
  --muted: rgba(203,213,225,0.75);
  --font: 'Crimson Pro', Georgia, serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-in-out-sine: cubic-bezier(0.37, 0, 0.63, 1);
}

html, body {
  min-height: 100dvh;
  background: radial-gradient(ellipse at 20% 20%, #0f0a2e 0%, #050818 40%, #0a0520 70%, #020510 100%);
  color: var(--slate);
  font-family: var(--font);
  overflow-x: hidden;
}

/* ════════════════════════════════════════
   STARFIELD
════════════════════════════════════════ */
#starfield {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  will-change: opacity, transform;
  animation: twinkle var(--dur) var(--delay) infinite var(--ease-in-out-sine);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.12; transform: scale(1); }
  50%       { opacity: 0.9;  transform: scale(1.5); }
}

/* ════════════════════════════════════════
   PARTICLES
════════════════════════════════════════ */
#particles {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(147,197,253,0.9), rgba(192,132,252,0.3));
  will-change: transform, opacity;
  animation: rise var(--dur) var(--delay) infinite ease-in-out;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.6);   opacity: 0; }
  10%  { opacity: 0.9; }
  80%  { opacity: 0.3; }
  100% { transform: translateY(-105vh) scale(1); opacity: 0; }
}

/* ════════════════════════════════════════
   SCREENS
════════════════════════════════════════ */
.screen {
  position: relative; z-index: 10;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s var(--ease-out-quart);
}
.screen.active { opacity: 1; pointer-events: all; }
.screen.hidden { display: none; }

/* ════════════════════════════════════════
   LANDING
════════════════════════════════════════ */
#landing h1 {
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  font-weight: 700;
  background: linear-gradient(135deg, #e2e8f0, #93c5fd, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 2.2rem;
  letter-spacing: 0.01em;
}

/* ════════════════════════════════════════
   TARDIS WRAP
════════════════════════════════════════ */
#tardis-wrap {
  cursor: pointer;
  width: 164px;
  position: relative;
  will-change: transform;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  animation: float 5s var(--ease-in-out-sine) infinite;
}
#tardis-wrap:active { animation-play-state: paused; transform: scale(0.96); }

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-12px); }
}

.ground-glow {
  position: absolute; bottom: -14px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 16px;
  background: radial-gradient(ellipse, rgba(96,165,250,0.6), transparent 70%);
  border-radius: 50%;
  filter: blur(8px);
  will-change: opacity, transform;
  animation: groundPulse 5s var(--ease-in-out-sine) infinite;
}
@keyframes groundPulse {
  0%, 100% { opacity: 0.5;  transform: translateX(-50%) scaleX(1); }
  50%       { opacity: 0.85; transform: translateX(-50%) scaleX(1.15); }
}

/* ════════════════════════════════════════
   TARDIS INNER ANIMATIONS
════════════════════════════════════════ */
#lamp-glow {
  will-change: opacity;
  animation: lampPulse 2s var(--ease-in-out-sine) infinite;
}
@keyframes lampPulse {
  0%, 100% { opacity: 0.55; }
  50%       { opacity: 1; }
}
.win-glow  { animation: winPulse 2.5s var(--ease-in-out-sine) infinite; }
.win-glow2 { animation: winPulse 2.5s 0.8s var(--ease-in-out-sine) infinite; }
@keyframes winPulse {
  0%, 100% { opacity: 0.05; }
  50%       { opacity: 0.2; }
}

/* ════════════════════════════════════════
   DOORS
════════════════════════════════════════ */
#door-left {
  transform-origin: left center;
  transform-box: fill-box;
  will-change: transform;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}
#door-right {
  transform-origin: right center;
  transform-box: fill-box;
  will-change: transform;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.doors-open #door-left  { transform: perspective(400px) rotateY(-68deg); }
.doors-open #door-right { transform: perspective(400px) rotateY(68deg); }

#inner-glow {
  opacity: 0;
  will-change: opacity;
  transition: opacity 1.2s ease 0.6s;
}
#light-beam {
  opacity: 0;
  will-change: opacity;
  transition: opacity 1s ease 1s;
}
.doors-open #inner-glow { opacity: 1; }
.doors-open #light-beam { opacity: 0.55; }

/* ════════════════════════════════════════
   TARDIS GLOW STATES
════════════════════════════════════════ */
#tardis-svg {
  filter: drop-shadow(0 0 10px rgba(59,130,246,0.7));
  will-change: filter;
  transition: filter 0.7s ease;
}
.glowing #tardis-svg {
  filter:
    drop-shadow(0 0 22px #60a5fa)
    drop-shadow(0 0 55px #818cf8)
    drop-shadow(0 0 95px rgba(167,139,250,0.45));
}

/* ════════════════════════════════════════
   INVITE TEXT
════════════════════════════════════════ */
.invite-text {
  margin-top: 2rem;
  font-style: italic;
  color: rgba(203,213,225,0.7);
  font-size: 1.08rem;
  line-height: 1.7;
  max-width: 290px;
}
.tap-hint {
  display: block;
  margin-top: 1rem;
  font-size: 0.8rem;
  color: rgba(147,197,253,0.75);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-style: normal;
  animation: hintPulse 2.8s var(--ease-in-out-sine) infinite;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}

/* ════════════════════════════════════════
   FADE-UP UTILITY
════════════════════════════════════════ */
.fade-up {
  opacity: 0;
  transform: translateY(26px);
  will-change: opacity, transform;
  transition:
    opacity 0.95s var(--ease-out-expo),
    transform 0.95s var(--ease-out-expo);
}
.fade-up.in {
  opacity: 1;
  transform: translateY(0);
}

/* ════════════════════════════════════════
   INSIDE SCREEN
════════════════════════════════════════ */
#inside {
  justify-content: flex-start;
  padding: 3.5rem 1rem 4rem;
}
.inside-header { margin-bottom: 2.2rem; }
.inside-badge {
  display: inline-block;
  padding: 0.35rem 1rem;
  border-radius: 9999px;
  background: rgba(96,165,250,0.08);
  border: 1px solid rgba(96,165,250,0.2);
  font-size: 0.7rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(147,197,253,0.7);
  margin-bottom: 0.8rem;
}
.inside-title {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #e2e8f0, #93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ════════════════════════════════════════
   CARDS
════════════════════════════════════════ */
.cards-container {
  display: flex; flex-direction: column;
  gap: 1.3rem;
  width: 100%; max-width: 400px;
  margin: 0 auto;
}
.memory-card {
  position: relative;
  border-radius: 1.5rem;
  padding: 1.5rem 1.5rem 1.4rem;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(30,27,75,0.95) 0%, rgba(15,23,42,0.98) 100%);
  border: 1px solid rgba(96,165,250,0.22);
  box-shadow:
    0 0 18px rgba(96,165,250,0.1),
    0 8px 32px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.04);
  text-align: left;
  opacity: 0;
  transform: translateY(38px) scale(0.97);
  will-change: opacity, transform;
  transition:
    opacity 0.9s var(--ease-out-expo),
    transform 0.9s var(--ease-out-expo);
}
.memory-card.last-card {
  border-color: rgba(167,139,250,0.32);
  box-shadow:
    0 0 36px rgba(167,139,250,0.28),
    0 8px 32px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.05);
}
.memory-card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.card-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(147,197,253,0.035) 50%, transparent 70%);
  pointer-events: none;
}
.card-corner {
  position: absolute; top: 0; right: 0;
  width: 5.5rem; height: 5.5rem;
  border-radius: 50%;
  background: radial-gradient(circle, #818cf8, transparent);
  opacity: 0.09;
  transform: translate(35%, -35%);
  pointer-events: none;
}
.card-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 1rem;
  letter-spacing: 0.02em;
}
.card-content {
  font-size: 0.95rem;
  color: rgba(203,213,225,0.85);
  line-height: 2;
  white-space: pre-line;
}
.card-accent {
  margin-top: 1.2rem;
  height: 1px; width: 3.5rem;
  background: linear-gradient(90deg, rgba(96,165,250,0.55), transparent);
  border-radius: 9999px;
}

/* ════════════════════════════════════════
   CONTINUE BUTTON
════════════════════════════════════════ */
.continue-btn {
  display: inline-block;
  margin: 2.8rem auto 2rem;
  padding: 1rem 2.2rem;
  border-radius: 1rem;
  font-family: var(--font);
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #e2e8f0;
  background: linear-gradient(135deg, rgba(96,165,250,0.18), rgba(167,139,250,0.2));
  border: 1px solid rgba(147,197,253,0.32);
  box-shadow: 0 0 22px rgba(96,165,250,0.18);
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px);
  will-change: opacity, transform;
  transition:
    opacity 0.9s var(--ease-out-expo),
    transform 0.9s var(--ease-out-expo),
    box-shadow 0.3s ease;
}
.continue-btn.visible { opacity: 1; transform: translateY(0); }
.continue-btn:active  { transform: scale(0.96) !important; }

/* ════════════════════════════════════════
   FINAL SCREEN
════════════════════════════════════════ */
#final { position: relative; }

.orb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.orb-inner {
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(167,139,250,0.18) 0%, transparent 70%);
  filter: blur(50px);
  will-change: transform, opacity;
  animation: orbPulse 5s var(--ease-in-out-sine) infinite;
}
@keyframes orbPulse {
  0%, 100% { transform: scale(1);    opacity: 0.5; }
  50%       { transform: scale(1.25); opacity: 0.85; }
}

.final-sparkle { font-size: 2.8rem; margin-bottom: 1.4rem; }
.final-title {
  font-size: clamp(1.9rem, 6vw, 2.4rem);
  font-weight: 700;
  background: linear-gradient(135deg, #f1f5f9, #93c5fd, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1.6rem;
}
.final-text {
  font-size: 1.05rem;
  color: var(--muted);
  font-style: italic;
  line-height: 2.3;
  max-width: 288px;
  margin: 0 auto 2.8rem;
  white-space: pre-line;
}
.exit-btn {
  padding: 1rem 2.2rem;
  border-radius: 1rem;
  font-family: var(--font);
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #e2e8f0;
  background: linear-gradient(135deg, rgba(96,165,250,0.14), rgba(167,139,250,0.2));
  border: 1px solid rgba(167,139,250,0.38);
  box-shadow: 0 0 28px rgba(167,139,250,0.22);
  cursor: pointer;
  will-change: transform;
  transition: box-shadow 0.3s ease, transform 0.15s ease;
}
.exit-btn:active { transform: scale(0.96); }

.cake-reveal {
  display: none;
  padding: 1.4rem 2.2rem;
  border-radius: 1rem;
  background: linear-gradient(135deg, rgba(30,27,75,0.9), rgba(15,23,42,0.95));
  border: 1px solid rgba(96,165,250,0.28);
  box-shadow: 0 0 36px rgba(96,165,250,0.18);
}
.cake-reveal.show {
  display: block;
  animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.78) translateY(14px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}
.cake-emoji { font-size: 2rem; margin-bottom: 0.45rem; }
.cake-text  { font-size: 1.05rem; font-weight: 600; color: #e2e8f0; }

/* ════════════════════════════════════════
   OVERLAY (for cinematic transitions)
════════════════════════════════════════ */
#overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #020510;
  opacity: 0;
  pointer-events: none;
  will-change: opacity;
}
</style>
</head>
<body>

<div id="overlay"></div>
<div id="starfield"></div>
<div id="particles"></div>

<!-- ══════════════════════════════════════════
     LANDING
══════════════════════════════════════════ -->
<div class="screen active" id="landing">
  <h1 class="fade-up">Happy Birthday Aditi ✨</h1>

  <div id="tardis-wrap" onclick="handleTardisClick()">
    <div class="ground-glow"></div>
    <svg id="tardis-svg" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
      <defs>
        <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#bfdbfe" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="lightBeam" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#bfdbfe" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <rect id="inner-glow" x="30" y="40" width="140" height="240" fill="url(#innerGlow)"/>
      <rect x="20" y="30" width="160" height="270" rx="4" fill="#1d4ed8" stroke="#3b82f6" stroke-width="2"/>
      <rect x="10" y="20" width="180" height="18" rx="3" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="15" y="14" width="170" height="10" rx="2" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
      <rect x="30" y="6"  width="140" height="12" rx="2" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1"/>
      <rect x="88" y="0" width="24" height="10" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <ellipse id="lamp-glow" cx="100" cy="3" rx="10" ry="5" fill="#bfdbfe"/>
      <rect x="30" y="38" width="140" height="18" rx="2" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1"/>
      <text x="100" y="51" text-anchor="middle" fill="#bfdbfe" font-size="8" font-family="serif" letter-spacing="2">POLICE BOX</text>
      <rect x="32"  y="65" width="56" height="44" rx="3" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="112" y="65" width="56" height="44" rx="3" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="60"  y1="65" x2="60"  y2="109" stroke="#60a5fa" stroke-width="1"/>
      <line x1="32"  y1="87" x2="88"  y2="87"  stroke="#60a5fa" stroke-width="1"/>
      <line x1="140" y1="65" x2="140" y2="109" stroke="#60a5fa" stroke-width="1"/>
      <line x1="112" y1="87" x2="168" y2="87"  stroke="#60a5fa" stroke-width="1"/>
      <rect class="win-glow"  x="33"  y="66" width="54" height="42" rx="2" fill="#bfdbfe"/>
      <rect class="win-glow2" x="113" y="66" width="54" height="42" rx="2" fill="#bfdbfe"/>
      <rect x="32" y="120" width="136" height="170" rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
      <g id="door-left">
        <rect x="33" y="122" width="66" height="166" rx="1" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
        <rect x="38" y="128" width="56" height="70"  rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <rect x="38" y="208" width="56" height="74"  rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <circle cx="96" cy="210" r="3" fill="#93c5fd"/>
      </g>
      <g id="door-right">
        <rect x="101" y="122" width="66" height="166" rx="1" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
        <rect x="106" y="128" width="56" height="70"  rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <rect x="106" y="208" width="56" height="74"  rx="2" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
        <circle cx="104" cy="210" r="3" fill="#93c5fd"/>
      </g>
      <polygon id="light-beam" points="68,122 132,122 160,290 40,290" fill="url(#lightBeam)"/>
    </svg>
  </div>

  <div class="invite-text fade-up">
    "Aditi… come with me in the TARDIS"
    <span class="tap-hint">tap to enter</span>
  </div>
</div>

<!-- ══════════════════════════════════════════
     INSIDE
══════════════════════════════════════════ -->
<div class="screen hidden" id="inside">
  <div class="inside-header fade-up">
    <div class="inside-badge">inside the tardis</div>
    <div class="inside-title">Memories, floating</div>
  </div>
  <div class="cards-container" id="cards-container"></div>
  <button class="continue-btn" id="continue-btn" onclick="goFinal()">
    Continue the journey →
  </button>
</div>

<!-- ══════════════════════════════════════════
     FINAL
══════════════════════════════════════════ -->
<div class="screen hidden" id="final">
  <div class="orb"><div class="orb-inner"></div></div>
  <div class="final-sparkle fade-up">✨</div>
  <h2 class="final-title fade-up">You made it ✨</h2>
  <p class="final-text fade-up">not just through the TARDIS

but through all the little things
that make you… you

Happy Birthday Aditi ❤️</p>
  <div id="exit-area">
    <button class="exit-btn fade-up" onclick="showCake()">
      Step out of the TARDIS
    </button>
  </div>
  <div class="cake-reveal" id="cake-reveal">
    <div class="cake-emoji">🎂</div>
    <div class="cake-text">Go find your cake</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const $ = id => document.getElementById(id);

// Animate overlay opacity using Web Animations API for precise control
function animateOverlay(fromOpacity, toOpacity, duration) {
  return new Promise(resolve => {
    const ov = $('overlay');
    ov.style.opacity = fromOpacity;
    ov.style.pointerEvents = toOpacity > 0 ? 'all' : 'none';
    const anim = ov.animate(
      [{ opacity: fromOpacity }, { opacity: toOpacity }],
      { duration, easing: 'ease', fill: 'forwards' }
    );
    anim.onfinish = () => {
      ov.style.opacity = toOpacity;
      resolve();
    };
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function staggerIn(els, baseDelay, step) {
  els.forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), baseDelay + i * step);
  });
}

/* ══════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════ */
const sf = $('starfield');
for (let i = 0; i < 130; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.4 + 0.4;
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${size}px; height:${size}px;
    --dur:${(Math.random()*3+2).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  sf.appendChild(s);
}

/* ══════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════ */
const pc = $('particles');
for (let i = 0; i < 20; i++) {

/* ══════════════════════════════════════════
   TARDIS TAP
══════════════════════════════════════════ */
let clicked = false;
async function handleTardisClick() {
  if (clicked) return;
  clicked = true;

  const wrap = $('tardis-wrap');

  // 1. glow burst
  wrap.classList.add('glowing');
  await wait(600);

  // 2. doors open
  wrap.classList.add('doors-open');
  await wait(1300);

  // 3. cinematic fade to black
  await animateOverlay(0, 1, 550);

  // 4. swap to inside
  $('landing').classList.add('hidden');
  showInside();

  // 5. fade back in
  await animateOverlay(1, 0, 750);
}

/* ══════════════════════════════════════════
   SHOW INSIDE
══════════════════════════════════════════ */
function showInside() {
  const inside = $('inside');
  inside.classList.remove('hidden');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    inside.classList.add('active');

    // header badge + title
    setTimeout(() => {
      inside.querySelectorAll('.fade-up').forEach(el => el.classList.add('in'));
    }, 180);

    // stagger cards
    const cards = inside.querySelectorAll('.memory-card');
    cards.forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), 320 + i * 210);
    });

    // continue button
    setTimeout(() => {
      $('continue-btn').classList.add('visible');
    }, 320 + cards.length * 210 + 320);
  }));
}

/* ══════════════════════════════════════════
   GO FINAL
══════════════════════════════════════════ */
async function goFinal() {
  await animateOverlay(0, 1, 500);

  $('inside').classList.remove('active');
  $('inside').classList.add('hidden');

  const final = $('final');
  final.classList.remove('hidden');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    final.classList.add('active');
  }));

  await animateOverlay(1, 0, 750);

  staggerIn(final.querySelectorAll('.fade-up'), 100, 300);
}

/* ══════════════════════════════════════════
   SHOW CAKE
══════════════════════════════════════════ */
function showCake() {
  const area = $('exit-area');
  area.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 380, easing: 'ease', fill: 'forwards' })
    .onfinish = () => {
      area.style.display = 'none';
      $('cake-reveal').classList.add('show');
    };
}
